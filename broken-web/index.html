        const paper = new THREE.Mesh(new THREE.BoxGeometry(1.55, 2.62, 0.035), paperMaterial);
        paper.position.y = 2.64;
        paper.castShadow = true;
        paper.receiveShadow = true;
        scroll.add(paper);

        const rodGeo = new THREE.CylinderGeometry(0.055, 0.055, 1.92, 16);
        const top = new THREE.Mesh(rodGeo, materials.metalEdge);
        top.rotation.z = Math.PI / 2;
        top.position.y = 4.0;
        const bottom = top.clone();
        bottom.position.y = 1.28;
        scroll.add(top, bottom);

        const textCanvas = document.createElement("canvas");
        textCanvas.width = 256;
        textCanvas.height = 512;
        const ctx = textCanvas.getContext("2d");
        ctx.clearRect(0, 0, textCanvas.width, textCanvas.height);
        ctx.fillStyle = "rgba(26,18,12,0.82)";
        ctx.font = "700 46px serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        "三歩進んで".split("").forEach((char, index) => ctx.fillText(char, 154, 118 + index * 45));
        "二歩戻る".split("").forEach((char, index) => ctx.fillText(char, 98, 142 + index * 48));
        const texture = new THREE.CanvasTexture(textCanvas);
        const textMaterial = new THREE.MeshBasicMaterial({ map: texture, transparent: true, opacity: 0.2 });
        const text = new THREE.Mesh(
          new THREE.PlaneGeometry(1.32, 2.24),
          textMaterial
        );
        text.position.set(0, 2.64, 0.026);
        scroll.add(text);

        scroll.position.set(0, 0.14, -4.98);
        scene.add(scroll);
        return { paper: paperMaterial, text: textMaterial, target: paper };
      }

      function buildBrokenTerminal(scene, materials) {
        const monitor = new THREE.Group();
        const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.58, 0.22), materials.metal);
        const screen = new THREE.Mesh(
          new THREE.PlaneGeometry(0.62, 0.36),
          new THREE.MeshBasicMaterial({ color: 0x103552, transparent: true, opacity: 0.62 })
        );
        screen.position.set(0, 0.04, 0.116);
        monitor.add(body, screen);
        monitor.position.set(3.55, 0.62, -3.55);
        monitor.rotation.y = -0.36;
        scene.add(monitor);

        const screenLight = new THREE.PointLight(0x3f8dcc, 0.42, 2.4, 2);
        screenLight.position.set(3.3, 0.82, -3.1);
        scene.add(screenLight);
        return { monitor, screen, light: screenLight };
      }

      function buildControlDevice(scene, materials, lampObjects, activationObject) {
        const device = new THREE.Group();
        device.rotation.x = -0.03;

        const base = new THREE.Mesh(new THREE.BoxGeometry(4.9, 1.35, 2.38), materials.metal);
        base.position.set(0, 0.76, 0);
        base.castShadow = true;
        base.receiveShadow = true;
        device.add(base);

        const top = new THREE.Mesh(new THREE.BoxGeometry(5.2, 0.28, 2.68), materials.metalEdge);
        top.position.set(0, 1.52, 0);
        top.castShadow = true;
        top.receiveShadow = true;
        device.add(top);

        const frontPlate = new THREE.Mesh(new THREE.BoxGeometry(3.95, 0.86, 0.055), materials.plate);
        frontPlate.position.set(0, 0.71, 1.22);
        frontPlate.castShadow = true;
        device.add(frontPlate);

        const activationMaterial = new THREE.MeshStandardMaterial({
          color: 0x2c2420,
          roughness: 0.36,
          metalness: 0.18,
          emissive: 0x000000,
          emissiveIntensity: 1.3
        });
        const activationSocket = new THREE.Mesh(new THREE.CylinderGeometry(0.28, 0.32, 0.12, 28), materials.black);
        activationSocket.position.set(2.05, 0.86, 1.34);
        activationSocket.rotation.x = Math.PI / 2;
        activationSocket.castShadow = true;
        device.add(activationSocket);

        const activationButton = new THREE.Mesh(new THREE.CylinderGeometry(0.22, 0.25, 0.15, 28), activationMaterial);
        activationButton.position.set(2.05, 0.86, 1.39);
        activationButton.rotation.x = Math.PI / 2;
        activationButton.castShadow = true;
        device.add(activationButton);

        const activationLight = new THREE.PointLight(0x000000, 0, 2.2, 2);
        activationLight.position.set(2.05, 0.9, 1.62);
        device.add(activationLight);
        activationObject.button = activationButton;
        activationObject.light = activationLight;

        [-1.24, 0, 1.24].forEach((x, index) => {
          const socket = new THREE.Mesh(new THREE.BoxGeometry(0.72, 0.48, 0.08), materials.black);
          socket.position.set(x, 0.86, 1.285);
          socket.castShadow = true;
          device.add(socket);

          const modelAnchor = new THREE.Group();
          modelAnchor.position.set(x, 0.86, 1.34);
          modelAnchor.rotation.x = 0;
          modelAnchor.scale.setScalar(1.55);
          modelAnchor.userData.baseY = modelAnchor.position.y;
          device.add(modelAnchor);

          const glow = new THREE.Mesh(
            new THREE.BoxGeometry(0.78, 0.52, 0.025),
            new THREE.MeshBasicMaterial({ color: 0x000000, transparent: true, opacity: 0, depthWrite: false })
          );
          glow.position.set(x, 0.86, 1.38);
          device.add(glow);

          const light = new THREE.PointLight(0x000000, 0, 3.2, 1.8);
          light.userData.baseIntensity = 0;
          light.position.set(x, 0.9, 1.62);
          device.add(light);
          lampObjects[index] = { modelAnchor, modelMaterials: [], glow, light };
        });

        for (let x = -2.25; x <= 2.25; x += 4.5) {
          for (let z = -1.05; z <= 1.05; z += 2.1) {
            const bolt = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.035, 12), materials.black);
            bolt.rotation.x = Math.PI / 2;
            bolt.position.set(x, 1.685, z);
            device.add(bolt);
          }
        }

        device.scale.setScalar(0.82);
        device.position.set(0, 0.04, -0.42);
        scene.add(device);
        return { group: device, target: frontPlate };
      }

    })();
  </script>
